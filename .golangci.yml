version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - typecheck
    - gocritic
    - gosec
    - bodyclose
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
    gosec:
      excludes:
        - G104  # Audit errors not checked (we have intentional fire-and-forget patterns)
        - G304  # File inclusion via variable (needed for config-driven file paths)
  exclusions:
    max-issues-per-linter: 50
    max-same-issues: 5
