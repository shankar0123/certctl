{{- if .Values.agent.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "certctl.fullname" . }}-agent
  labels:
    {{- include "certctl.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
data:
  {{- if .Values.agent.discoveryDirs }}
  discovery-dirs: {{ .Values.agent.discoveryDirs | quote }}
  {{- end }}
{{- end }}
